name: amplio-prod

# Production stack: reverse proxy (auto-TLS) in front of the dashboard, query
# API, and ingest service, backed by ClickHouse and Postgres.
#
# Copy .env.prod.example to .env and fill in secrets, then:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d
#
# Build context for the service images is the repo root.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      AMPLIO_DOMAIN: ${AMPLIO_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [web, api, ingest]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  ingest:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8787
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: amplio
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      AMPLIO_DEV_API_KEYS: ${AMPLIO_WRITE_KEYS}
    depends_on:
      clickhouse:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: 8788
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: amplio
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      AMPLIO_READ_KEYS: ${AMPLIO_READ_KEYS}
    depends_on:
      clickhouse:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      CLICKHOUSE_DB: amplio
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: amplio
      POSTGRES_USER: amplio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amplio -d amplio"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  caddy_data:
  caddy_config:
  clickhouse_data:
  postgres_data:
