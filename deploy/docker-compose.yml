name: amplio

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: amplio-clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: amplio
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16
    container_name: amplio-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: amplio
      POSTGRES_USER: amplio
      POSTGRES_PASSWORD: amplio
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amplio -d amplio"]
      interval: 5s
      timeout: 3s
      retries: 20
