name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI only syntax-checks the desktop app; it never launches Electron.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Build library packages so dependents resolve their type declarations.
      - run: pnpm --filter @amplio/schema build
      - run: pnpm --filter @amplio/query build
      - run: pnpm --filter @amplio/db build
      - run: pnpm --filter @amplio/sdk-browser build
      - run: pnpm typecheck
      - run: pnpm test
